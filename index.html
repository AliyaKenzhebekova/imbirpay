const getBranchUsers = (branch, cfg) => {
  if (!branch) return [];

// Callmebot — бесплатные WhatsApp уведомления (https://www.callmebot.com/blog/free-api-whatsapp-messages/)
const sendWhatsApp = (phone, apikey, text) => {
  if (!phone || !apikey || !text) return false;
  const p = phone.replace(/\D/g,'');
  const url = `https://api.callmebot.com/whatsapp.php?phone=${p}&text=${encodeURIComponent(text)}&apikey=${encodeURIComponent(apikey)}`;
  fetch(url, { mode:'no-cors' }).catch(()=>{});
  return true;
};

const buildWAMsg = (req, event, extra='') => {
  const header = {
    new:      '🆕 Новая заявка',
    manager:  '📋 На согласование (учредитель)',
    approved: '✅ Готово к оплате',
    paid:     '💳 Заявка оплачена',
    rejected: '❌ Заявка отклонена',
  }[event] || '📋 ImbirPay';
  return [
    `${header} — ImbirPay`,
    `━━━━━━━━━━━━━━━━━━`,
    `ID: ${req.id}`,
    `От: ${req.initiatorName} (${req.branch})`,
    `Сумма: ${fmt(req.amount)}`,
    `Категория: ${getCategoryLabel(req.category)}`,
    `Срок: ${fmtD(req.dueDate)}`,
    `Цель: ${req.purpose.slice(0,100)}${req.purpose.length>100?'…':''}`,
    ...(extra ? [``, extra] : []),
  ].join('\n');
};

const dispatchWANotifications = (req, prevStatus, waContacts) => {
  const wc = waContacts || {};
  const get = name => wc[name];
  const notify = (name, event, extra) => {
    const c = get(name);
    if (c?.phone && c?.apikey) sendWhatsApp(c.phone, c.apikey, buildWAMsg(req, event, extra));
  };
  // Новая заявка → Учредителю
  if (!prevStatus || (prevStatus === 'new' && req.status === 'manager')) {
    notify('Мусина Дина', 'manager', '⏳ Ожидает вашего согласования');
  }
  // Учредитель одобрил → Казначею
  if (prevStatus === 'manager' && req.status === 'approved') {
    notify('Гульнар Сулейменова', 'approved', '✅ Готово к оплате');
  }
  // Оплачено → Инициатору
  if (prevStatus === 'approved' && req.status === 'paid') {
    const tr = get('Гульнар Сулейменова');
    notify(req.initiatorName, 'paid', `Исполнил: ${tr?'Гульнар Сулейменова':''}`);
  }
  // Отклонено → Инициатору
  if (req.status === 'rejected' && prevStatus !== 'rejected') {
    const lastComment = [...req.history].reverse().find(h=>h.action==='Отклонено')?.comment || '';
    notify(req.initiatorName, 'rejected', lastComment ? `Причина: ${lastComment}` : '');
  }
};

const SB_URL  = 'https://urahbktvjomdlkiqfrgq.supabase.co';

const sb = supabase.createClient(SB_URL, SB_KEY);

const sbLoad = async () => {
  try {
    const { data, error } = await sb.from('requests').select('data');
    if (error || !data) return null;
    return data.map(r => r.data).sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt));
  } catch { return null; }
};

const sbSave = async (requests) => {
  try {
    const rows = requests.map(r => ({ id: r.id, data: r, updated_at: new Date().toISOString() }));
    await sb.from('requests').upsert(rows);
  } catch {}
};

const sbDelete = async (id) => {
  try { await sb.from('requests').delete().eq('id', id); } catch {}
};

let _sbChannel = null;
const sbSubscribe = (onUpdate) => {
  if (_sbChannel) sb.removeChannel(_sbChannel);
  _sbChannel = sb.channel('requests-realtime')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'requests' }, async () => {
      const data = await sbLoad();
      if (data) { onUpdate(data); lsSave(data); }
    })
    .subscribe();
  return () => { if (_sbChannel) sb.removeChannel(_sbChannel); };
};

function Toast({ message, type, onClose }) {
  useEffect(() => { const t = setTimeout(onClose, 3500); return () => clearTimeout(t); }, []);
  const colors = { success:'bg-green-600', error:'bg-red-600', info:'bg-blue-600' };
  return (
    <div className={`fixed bottom-6 left-1/2 -translate-x-1/2 ${colors[type]||'bg-gray-800'} text-white px-5 py-3 rounded-xl shadow-xl z-[100] flex items-center gap-3 anim-toast`}>
      <span>{type==='success'?'✅':type==='error'?'❌':'ℹ️'}</span>
      <span className="text-sm font-medium">{message}</span>
      <button onClick={onClose} className="ml-2 opacity-70 hover:opacity-100 text-lg leading-none">×</button>
    </div>
  );
}

function ProfileModal({ user, passwords, waContacts, onSavePassword, onSaveWA, onClose }) {

  const [currentPw, setCurrentPw] = useState('');
  const [newPw,     setNewPw]     = useState('');

    <button type="button" onClick={toggle}

      {show ? '🙈' : '👁'}
    </button>
  );

  const handleSavePassword = () => {
    setPwError('');
    if (currentPw !== (passwords[user.name] || 'imbir2026')) { setPwError('Неверный текущий пароль'); return; }
    if (newPw.length < 4) { setPwError('Новый пароль — минимум 4 символа'); return; }
    if (newPw !== confirmPw) { setPwError('Пароли не совпадают'); return; }
    onSavePassword(user.name, newPw);
    setPwSuccess(true);
    setTimeout(onClose, 1500);
  };

  const handleSaveWA = () => {
    onSaveWA(user.name, { phone: waPhone.trim(), apikey: waApikey.trim() });
    setWaSaved(true);
    setTimeout(() => setWaSaved(false), 2500);
  };

  const handleTestWA = () => {
    if (!waPhone || !waApikey) return;
    setWaTesting(true); setWaTestRes('');
    sendWhatsApp(waPhone, waApikey, `✅ Тест ImbirPay\nПривет, ${user.name}!\nУведомления подключены.`);

function LoginPage({ onLogin, settings, passwords }) {
  const [branch, setBranch] = useState('');
  const [selectedUser, setSelectedUser] = useState('');
  const [password, setPassword] = useState('');
  const [error, setError] = useState('');
  const [loading, setLoading] = useState(false);

  const cfg = settings || DEFAULT_SETTINGS;
  const loginBranches = cfg.branches;
  const branchUsers = useMemo(() => branch ? getBranchUsers(branch, cfg) : [], [branch, cfg]);

  const handleBranchChange = (e) => {
    setBranch(e.target.value);
    setSelectedUser('');
    setError('');
  };

  const handleLogin = () => {
    if (!branch) { setError('Выберите филиал'); return; }
    if (!selectedUser) { setError('Выберите сотрудника'); return; }
    if (!password) { setError('Введите пароль'); return; }
    const correctPw = (passwords || DEFAULT_PASSWORDS)[selectedUser] || 'imbir2026';
    if (password !== correctPw) { setError('Неверный пароль'); return; }
    setLoading(true);
    const user = USERS.find(u => u.name === selectedUser);
    setTimeout(() => { onLogin({ ...user, loginBranch: branch }); }, 700);
  };

  return (
    <div className="min-h-screen flex items-center justify-center login-bg">
      <div className="w-full max-w-md anim-fade px-4">
        {/* Logo block */}
        <div className="flex flex-col items-center mb-8">
          <div className="w-20 h-20 rounded-2xl flex items-center justify-center mb-5 shadow-lg" style={{background:'rgba(255,255,255,0.12)', border:'1.5px solid rgba(182,146,68,0.5)'}}>
            <span className="text-white text-4xl font-black" style={{fontFamily:'Cormorant Garamond, serif'}}>₸</span>
          </div>
          <h1 className="text-4xl font-bold text-white tracking-wide" style={{fontFamily:'Cormorant Garamond, serif', letterSpacing:'0.08em'}}>IMBIR PAY</h1>
          <div className="gold-divider w-32 my-3" />
          <p className="text-sm mt-1" style={{color:'rgba(182,146,68,0.85)', letterSpacing:'0.12em', textTransform:'uppercase', fontSize:'11px'}}>Казначейство · Imbir Group</p>
        </div>

      <div className="card p-10" style={{background:'rgba(255,255,255,0.97)'}}>
        <div className="space-y-4">

        <div className="space-y-4">
          {/* Step 1: Branch */}
          <div>
            <label className="block text-sm font-medium text-gray-700 mb-1.5">
              <span className="inline-flex items-center gap-1.5">
                <span className="w-5 h-5 rounded-full text-white text-xs flex items-center justify-center font-bold" style={{background:BRAND}}>1</span>
                Выберите филиал
              </span>
            </label>
            <select value={branch} onChange={handleBranchChange} className="input-field">
              <option value="">— Выберите филиал —</option>
              {loginBranches.map(b => <option key={b} value={b}>{b}</option>)}
            </select>
          </div>

          {/* Step 2: User (shown after branch selected) */}
          {branch && (
            <div className="anim-fade">
              <label className="block text-sm font-medium text-gray-700 mb-1.5">
                <span className="inline-flex items-center gap-1.5">
                  <span className="w-5 h-5 rounded-full text-white text-xs flex items-center justify-center font-bold" style={{background:BRAND}}>2</span>
                  Сотрудник
                </span>
              </label>
              <select value={selectedUser} onChange={e => { setSelectedUser(e.target.value); setError(''); }}
                      className="input-field">
                <option value="">— Выберите из списка —</option>
                {branchUsers.map(u => (
                  <option key={u.name} value={u.name}>{u.name} — {u.position}</option>
                ))}
              </select>
              {branchUsers.length === 0 && (
                <p className="text-xs text-amber-600 mt-1">Для этого филиала нет назначенных сотрудников</p>
              )}
            </div>
          )}

          {/* Step 3: Password (shown after user selected) */}
          {selectedUser && (
            <div className="anim-fade">
              <label className="block text-sm font-medium text-gray-700 mb-1.5">
                <span className="inline-flex items-center gap-1.5">
                  <span className="w-5 h-5 rounded-full text-white text-xs flex items-center justify-center font-bold" style={{background:BRAND}}>3</span>
                  Пароль
                </span>
              </label>
              <input type="password" className="input-field" placeholder="Введите пароль" autoFocus
                     value={password} onChange={e => { setPassword(e.target.value); setError(''); }}
                     onKeyDown={e => e.key==='Enter' && handleLogin()} />
            </div>
          )}

          {error && <p className="text-sm text-red-600 bg-red-50 px-3 py-2 rounded-lg">{error}</p>}

          <button className="btn-primary w-full mt-2" disabled={loading || !branch || !selectedUser || !password} onClick={handleLogin}>
            {loading ? 'Вход...' : 'Войти в систему'}
          </button>
        </div>

        </div>
      </div>

        <p className="text-xs text-center mt-6" style={{color:'rgba(182,146,68,0.7)', letterSpacing:'0.08em'}}>ТОО «Imbir Group» · Конфиденциально</p>
      </div>
    </div>
  );
}

function KPICards({ requests, filter, setFilter }) {
  const stats = useMemo(() => ({
    new:      requests.filter(r=>r.status==='new'),
    manager:  requests.filter(r=>r.status==='manager'),
    approved: requests.filter(r=>r.status==='approved'),
    paid:     requests.filter(r=>r.status==='paid'),
    rejected: requests.filter(r=>r.status==='rejected'),
    blocked:  requests.filter(r=>r.status==='blocked'),
  }), [requests]);

  const cards = [
    { key:'new',      label:'Новые',          icon:'🔵', activeColor:'#4D295D', activeBg:'#f5f0f8' },
    { key:'manager',  label:'У учредителя',   icon:'👔', activeColor:'#8f7033', activeBg:'#f8f4eb' },
    { key:'approved', label:'Одобрено',        icon:'✅', activeColor:'#1B7A4A', activeBg:'#e8f5ed' },
    { key:'paid',     label:'Оплачено',        icon:'💳', activeColor:'#1A4DAB', activeBg:'#e8eff9' },
    { key:'rejected', label:'Отклонено',       icon:'❌', activeColor:'#CF0000', activeBg:'#fff0f0' },
    { key:'blocked',  label:'Заблокировано',   icon:'🔒', activeColor:'#7a1000', activeBg:'#fff0f0' },
  ];

  return (
    <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-3 mb-6">
      {cards.map(c => {
        const group = stats[c.key] || [];
        const isActive = filter === c.key;
        return (
          <button key={c.key} onClick={()=>setFilter(isActive ? 'all' : c.key)}
                  className="card p-4 text-left transition-all cursor-pointer hover:shadow-md"
                  style={isActive ? {background:c.activeBg, borderColor:c.activeColor, borderWidth:'2px'} : {}}>
            <div className="text-xl mb-1">{c.icon}</div>
            <div className="text-xs font-medium mb-1 leading-tight" style={{color: isActive ? c.activeColor : '#6b7280'}}>{c.label}</div>
            <div className="text-2xl font-bold leading-tight" style={{color: isActive ? c.activeColor : '#111827'}}>{group.length}</div>
            <div className="text-xs mt-1 font-medium" style={{color: isActive ? c.activeColor : '#6b7280'}}>{fmt(sumOf(group))}</div>
          </button>
        );
      })}
    </div>
  );
}

function ApprovalChainView({ req }) {
  const getStepStatus = (chainKey) => {
    const flowIdx = STATUS_FLOW.indexOf(req.status);
    const chainMap = { manager:1, treasurer:2 };
    const stepIdx = chainMap[chainKey];
    if (req.status === 'rejected') return 'rejected';
    if (flowIdx > stepIdx) return 'done';
    if (flowIdx === stepIdx) return 'active';
    return 'pending';
  };

  const historyFor = (chainKey) => {
    const actionWords = { manager:['Одобрено','Отклонено'], treasurer:['Оплачено','Отклонено'] };
    const words = actionWords[chainKey] || [];
    return req.history.filter(h => words.some(w=>h.action.includes(w)));
  };

  return (
    <div className="space-y-3">
      {CHAIN.map((c, i) => {
        const st = getStepStatus(c.key);
        const hist = historyFor(c.key);
        const colors = {
          done: { border:'#1B9963', bg:'#E8F5ED', dot:'#1B9963', text:'#1B9963', icon:'✅' },
          active: { border:BRAND, bg:'#FFF5F0', dot:BRAND, text:BRAND, icon:'⏳' },
          pending: { border:'#e5e7eb', bg:'#f9fafb', dot:'#d1d5db', text:'#9ca3af', icon:'⭕' },
          rejected: { border:'#C0392B', bg:'#FDECEA', dot:'#C0392B', text:'#C0392B', icon:'❌' },
        }[st];
        return (
          <div key={c.key} className="chain-step" style={{borderColor:colors.border, background:colors.bg}}>
            <div className="w-8 h-8 rounded-full flex items-center justify-center text-sm flex-shrink-0"
                 style={{background:colors.dot, color:'#fff'}}>
              {i+1}
            </div>
            <div className="flex-1 min-w-0">
              <div className="flex items-center gap-2">
                <span className="text-sm font-semibold text-gray-800">{c.name}</span>
                <span className="text-xs" style={{color:colors.text}}>{colors.icon} {c.step}</span>
              </div>
              <div className="text-xs text-gray-500">{c.title}</div>
              {hist.map((h,j)=>(
                <div key={j} className="text-xs mt-1" style={{color:colors.text}}>
                  {fmtDT(h.date)} — {h.action}
                  {h.comment && <span className="text-gray-500"> · "{h.comment}"</span>}
                </div>
              ))}
            </div>
          </div>
        );
      })}
    </div>
  );
}

function Drawer({ req, onClose, onApprove, onReject, onBlock, onDelete, onEdit, user, onUpdateComment }) {
  const [comment, setComment] = useState(req.treasuryComment || '');
  const [rejectReason, setRejectReason] = useState('');
  const [showRejectForm, setShowRejectForm] = useState(false);
  const isManagement = ['manager','admin','treasurer'].includes(user.role);
  const canAct = canActOn(user.role, req.status, req);
  const isPayAction = user.role === 'treasurer';
  const approveLabel = isPayAction ? '💳 Оплатить' : '✅ Одобрить';
  const canBlock = user.role === 'admin';
  const canDelete = user.role === 'admin';
  const canEdit = req.initiatorName === user.name;
  const isBlocked = req.status === 'blocked';

  const doDelete = () => {
    if (!window.confirm(`Удалить заявку ${req.id} безвозвратно?`)) return;
    onDelete(req.id);
    onClose();
  };

  const doApprove = () => {
    onUpdateComment(req.id, comment);
    onApprove(req, user.name, comment);
    onClose();
  };

  const doReject = () => {
    if (!rejectReason.trim()) return;
    onUpdateComment(req.id, comment);
    onReject(req, user.name, rejectReason);
    onClose();
  };

  const doBlock = () => {
    onBlock(req, isBlocked ? 'unblock' : 'block', user.name);
    onClose();
  };

  const openFile = () => {
    if (!req.fileData) return;
    try {
      const win = window.open('', '_blank');
      if (req.fileData.startsWith('data:application/pdf')) {
        win.document.write(`<html><body style="margin:0"><iframe src="${req.fileData}" style="width:100%;height:100vh;border:none"></iframe></body></html>`);
      } else {
        win.document.write(`<html><body style="margin:0;background:#111;display:flex;align-items:center;justify-content:center;min-height:100vh"><img src="${req.fileData}" style="max-width:100%;max-height:100vh"/></body></html>`);
      }
      win.document.close();
    } catch(e) {
      const a = document.createElement('a');
      a.href = req.fileData;
      a.download = req.fileName || 'file';
      a.click();
    }
  };

  return (
    <>
      <div className="drawer-overlay" onClick={onClose} />
      <div className="drawer-panel anim-slide-right flex flex-col">
        {/* Header */}
        <div className="flex items-start justify-between p-6 border-b border-gray-100">
          <div>
            <div className="flex items-center gap-2 mb-1">
              <span className={`inline-flex items-center gap-1 px-2.5 py-0.5 rounded-lg text-xs font-semibold ${req.type==='invoice'?'type-badge-invoice':'type-badge-advance'}`}>
                {req.type==='invoice'?'🧾 Оплата счёта':'💵 Выдача подотчёт'}
              </span>
              {req.isDup && <span className="dup-badge">DUP</span>}
            </div>
            <div className="text-3xl font-black text-gray-900">{fmt(req.amount)}</div>
            <div className="text-xs font-mono text-gray-400 mt-0.5">{req.id}</div>
          </div>
          <button onClick={onClose} className="w-8 h-8 flex items-center justify-center rounded-lg hover:bg-gray-100 text-gray-500 text-xl">×</button>
        </div>

        {/* Body */}
        <div className="flex-1 overflow-y-auto p-6 space-y-6">
          {/* Status */}
          <div className="flex items-center gap-3">
            <StatusBadge status={req.status} />
            <PriorityBadge priority={req.priority} />
          </div>

          {/* Approval Chain */}
          <div>
            <h4 className="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-3">Цепочка согласования</h4>
            <ApprovalChainView req={req} />
          </div>

          {/* Basic info */}
          <div>
            <h4 className="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-3">Инициатор</h4>
            <div className="grid grid-cols-2 gap-3 text-sm">
              <div><span className="text-gray-500">ФИО:</span> <span className="font-medium text-gray-800">{req.initiatorName}</span></div>
              <div><span className="text-gray-500">Должность:</span> <span className="font-medium text-gray-800">{req.initiatorPosition}</span></div>
              <div><span className="text-gray-500">Филиал:</span> <span className="font-medium text-gray-800">{req.branch}</span></div>
              <div><span className="text-gray-500">Категория:</span> <span className="font-medium text-gray-800">{getCategoryIcon(req.category)} {getCategoryLabel(req.category)}</span></div>
              <div><span className="text-gray-500">Срок оплаты:</span> <span className="font-medium text-gray-800">{fmtD(req.dueDate)}</span></div>
              <div><span className="text-gray-500">Создана:</span> <span className="font-medium text-gray-800">{fmtD(req.createdAt)}</span></div>
            </div>
          </div>

          {/* Type-specific */}
          {req.type==='invoice' ? (
            <div>
              <h4 className="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-2">Счёт</h4>
              <div className="flex items-center gap-2 p-3 bg-blue-50 rounded-xl border border-blue-100">
                <span className="text-2xl">📎</span>
                <div className="flex-1 min-w-0">
                  <div className="text-sm font-semibold text-blue-700 truncate">{req.fileName}</div>
                  <div className="text-xs text-blue-500">Загружен инициатором</div>
                </div>
                {req.fileData ? (
                  <button onClick={openFile}
                     className="flex-shrink-0 btn-outline text-xs py-1.5 px-3">
                    👁 Открыть
                  </button>
                ) : (
                  <span className="text-xs text-blue-300 flex-shrink-0">предпросмотр недоступен</span>
                )}
              </div>
            </div>
          ) : (
            <div>
              <h4 className="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-2">Подотчёт</h4>
              <div className="grid grid-cols-2 gap-3 text-sm">
                <div><span className="text-gray-500">Название:</span> <span className="font-mono font-medium text-gray-800">{req.requestName}</span></div>
                <div><span className="text-gray-500">Получатель:</span> <span className="font-medium text-gray-800">{req.recipient}</span></div>
                <div><span className="text-gray-500">Форма выдачи:</span> <span className="font-medium text-gray-800">{req.paymentForm}</span></div>
                <div><span className="text-gray-500">Период:</span> <span className="font-medium text-gray-800">{fmtD(req.periodFrom)} – {fmtD(req.periodTo)}</span></div>
              </div>
            </div>
          )}

          {/* Purpose */}
          <div>
            <h4 className="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-2">Назначение и обоснование</h4>
            <p className="text-sm text-gray-700 bg-gray-50 rounded-xl p-3 leading-relaxed border border-gray-100">{req.purpose}</p>
          </div>

          {/* History */}
          <div>
            <h4 className="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-3">История изменений</h4>
            <div className="space-y-2">
              {req.history.map((h,i)=>(
                <div key={i} className="flex gap-3 text-xs">
                  <div className="w-1.5 h-1.5 rounded-full bg-gray-300 mt-1.5 flex-shrink-0" />
                  <div>
                    <span className="text-gray-500">{fmtDT(h.date)}</span>
                    <span className="mx-1.5 text-gray-300">·</span>
                    <span className="font-medium text-gray-700">{h.actor}</span>
                    <span className="mx-1.5 text-gray-300">·</span>
                    <span className="text-gray-600">{h.action}</span>
                    {h.comment && <span className="text-gray-400"> — "{h.comment}"</span>}
                  </div>
                </div>
              ))}
            </div>
          </div>

          {/* Treasury comment */}
          {isManagement && (
            <div>
              <h4 className="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-2">Комментарий казначея</h4>
              <textarea className="input-field text-sm resize-none" rows="2"
                        placeholder="Добавить комментарий..."
                        value={comment} onChange={e=>setComment(e.target.value)} />
            </div>
          )}

          {/* Reject form */}
          {showRejectForm && (
            <div className="bg-red-50 border border-red-200 rounded-xl p-4 space-y-3">
              <p className="text-sm font-medium text-red-700">Причина отклонения (обязательно)</p>
              <textarea className="input-field text-sm resize-none" rows="2"
                        placeholder="Укажите причину..." autoFocus
                        value={rejectReason} onChange={e=>setRejectReason(e.target.value)} />
              <div className="flex gap-2">
                <button onClick={doReject} disabled={!rejectReason.trim()} className="btn-danger text-xs py-2 px-4">Отклонить</button>
                <button onClick={()=>setShowRejectForm(false)} className="btn-ghost text-xs py-2 px-3">Отмена</button>
              </div>
            </div>
          )}
        </div>

        {/* Footer actions */}
        {canAct && !showRejectForm && (
          <div className="p-6 border-t border-gray-100 flex gap-3">
            <button onClick={doApprove} className="btn-primary flex-1">{approveLabel}</button>
            <button onClick={()=>setShowRejectForm(true)} className="btn-danger flex-1">✕ Отклонить</button>
          </div>
        )}

        {/* Block button for Алия (observer) */}
        {canBlock && !showRejectForm && (
          <div className="p-6 border-t border-gray-100">
            <button onClick={doBlock}
                    className="w-full py-2.5 px-4 rounded-xl text-sm font-semibold transition-all"
                    style={isBlocked
                      ? {background:'#f5f0f8', color:'#4D295D', border:'1px solid #c4a8d8'}
                      : {background:'#fff0f0', color:'#7a1000', border:'1px solid #e88080'}}>
              {isBlocked ? '🔓 Снять блокировку' : '🔒 Заблокировать счёт'}

        {/* Edit button — for initiator */}
        {canEdit && !showRejectForm && (
          <div className="px-6 pb-2">

function FirebaseSettings({ fbConfig, onSave, isConnected }) {
  const [raw, setRaw] = useState(fbConfig ? JSON.stringify(fbConfig, null, 2) : '');
  const [status, setStatus] = useState('');
  const [testing, setTesting] = useState(false);

  const handleTest = async () => {
    setTesting(true); setStatus('');
    try {
      const cfg = JSON.parse(raw);
      const ok = await fbTest(cfg);
      setStatus(ok ? 'ok' : 'err');
    } catch { setStatus('parse'); }
    setTesting(false);
  };

  const handleSave = () => {
    try { const cfg = JSON.parse(raw); onSave(cfg); setStatus('saved'); }
    catch { setStatus('parse'); }
  };

  const msg = { ok:'✅ Подключено! Нажмите Сохранить', err:'❌ Ошибка — проверьте config и правила БД', parse:'❌ Неверный JSON', saved:'✅ Сохранено — перезагрузите страницу' }[status] || '';

  return (
    <div className="card p-6 mt-6">
      <div className="flex items-center gap-3 mb-4">
        <span className="text-2xl">🔥</span>
        <div>
          <h3 className="font-semibold text-gray-800 flex items-center gap-2">
            Firebase — общая база данных
            {isConnected

function SettingsView({ settings, setSettings, passwords, onUpdatePassword, waContacts, onUpdateWA, fbConfig, onSaveFB, fbConnected }) {

  const allInitiators = USERS.filter(u => u.role === 'initiator');

  const save = (newSettings) => {
    setSettings(newSettings);
    saveSettings(newSettings);
    setSaved(true);
    setTimeout(() => setSaved(false), 2000);
  };

  const toggleAllBranchUser = (name) => {
    const cur = settings.allBranchUsers;
    const next = cur.includes(name) ? cur.filter(n => n !== name) : [...cur, name];
    save({ ...settings, allBranchUsers: next });
  };

  const toggleBranchUser = (branch, name) => {
    const cur = settings.branchSpecific[branch] || [];
    const next = cur.includes(name) ? cur.filter(n => n !== name) : [...cur, name];
    const newSpec = { ...settings.branchSpecific, [branch]: next };
    save({ ...settings, branchSpecific: newSpec });
  };

  const addBranch = () => {
    const name = newBranchName.trim();
    if (!name || settings.branches.includes(name)) return;
    save({
      ...settings,
      branches: [...settings.branches, name],
      branchSpecific: { ...settings.branchSpecific, [name]: [] },

    setNewBranchName('');

              <div className="mb-4 p-3 bg-blue-50 rounded-xl border border-blue-100">

function UserPasswordRow({ user, isDefault, onReset }) {
  const [editing, setEditing] = useState(false);
  const [newPw,   setNewPw]   = useState('');
  const [show,    setShow]    = useState(false);
  const [saved,   setSaved]   = useState(false);

  const handleReset = () => {
    if (!newPw.trim() || newPw.length < 4) return;
    onReset(user.name, newPw);
    setSaved(true);
    setEditing(false);
    setNewPw('');
    setTimeout(() => setSaved(false), 2500);
  };

  const handleResetToDefault = () => {
    onReset(user.name, 'imbir2026');
    setSaved(true);
    setTimeout(() => setSaved(false), 2500);
  };

  const roleColors = { manager:'bg-purple-100 text-purple-700', cfo:'bg-blue-100 text-blue-700', treasurer:'bg-green-100 text-green-700', initiator:'bg-gray-100 text-gray-600' };

  return (
    <div className={`p-4 rounded-xl border transition-all ${editing ? 'border-purple-200 bg-purple-50' : 'border-gray-100 bg-gray-50'}`}>
      <div className="flex items-start justify-between gap-2 mb-2">
        <div className="min-w-0">
          <div className="text-sm font-semibold text-gray-800 truncate">{user.name}</div>
          <div className="text-xs text-gray-500 truncate">{user.position}</div>
        </div>
        <div className="flex items-center gap-1 flex-shrink-0">
          <span className={`text-xs px-2 py-0.5 rounded-full font-medium ${roleColors[user.role]}`}>
            { {manager:'Учред.', cfo:'Финдир.', treasurer:'Казначей', initiator:''}[user.role] }
          </span>
          {saved && <span className="text-xs text-green-600 font-medium">✓</span>}
        </div>
      </div>

      <div className="flex items-center gap-1.5 mb-2">
        <div className={`w-2 h-2 rounded-full flex-shrink-0 ${isDefault ? 'bg-yellow-400' : 'bg-green-500'}`} />
        <span className="text-xs text-gray-500">{isDefault ? 'Стандартный пароль' : 'Пароль изменён'}</span>
      </div>

      {editing ? (
        <div className="space-y-2">
          <div className="relative">
            <input type={show ? 'text' : 'password'} className="input-field text-xs py-2 pr-8"
                   placeholder="Новый пароль (мин. 4 симв.)"
                   value={newPw} onChange={e => setNewPw(e.target.value)}
                   onKeyDown={e => e.key==='Enter' && handleReset()} autoFocus />
            <button type="button" onClick={() => setShow(s=>!s)}
                    className="absolute right-2 top-1/2 -translate-y-1/2 text-gray-400 text-xs">{show?'🙈':'👁'}</button>
          </div>
          <div className="flex gap-1.5">
            <button onClick={handleReset} disabled={newPw.length < 4}
                    className="btn-primary text-xs py-1.5 px-3 flex-1">Сохранить</button>
            <button onClick={() => { setEditing(false); setNewPw(''); }}
                    className="btn-ghost text-xs py-1.5 px-2">✕</button>
          </div>
        </div>
      ) : (
        <div className="flex gap-1.5">
          <button onClick={() => setEditing(true)}
                  className="btn-outline text-xs py-1.5 px-3 flex-1">✏️ Задать</button>
          {!isDefault && (
            <button onClick={handleResetToDefault}
                    className="btn-ghost text-xs py-1.5 px-2 border border-gray-200" title="Сбросить до imbir2026">↺</button>
          )}
        </div>
      )}
    </div>
  );
}

function DashboardView({ requests, user, onUpdate, onDelete, onEdit }) {
  const [filter, setFilter] = useState('all');
  const [search, setSearch] = useState('');
  const [selectedIds, setSelectedIds] = useState([]);
  const [drawerReq, setDrawerReq] = useState(null);

  const filtered = useMemo(() => {
    let arr = requests;
    if (filter !== 'all') arr = arr.filter(r => r.status === filter);
    if (search.trim()) {
      const q = search.toLowerCase();
      arr = arr.filter(r =>
        r.id.toLowerCase().includes(q) ||
        r.initiatorName.toLowerCase().includes(q) ||
        r.purpose.toLowerCase().includes(q) ||
        (r.fileName||'').toLowerCase().includes(q) ||
        (r.requestName||'').toLowerCase().includes(q)
      );
    }
    return arr.slice().sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));
  }, [requests, filter, search]);

  const advanceStatus = (req, actorName, comment='') => {
    const idx = STATUS_FLOW.indexOf(req.status);
    const next = idx < STATUS_FLOW.length-1 ? STATUS_FLOW[idx+1] : req.status;
    const actionLabels = {
      manager: 'Одобрено учредителем',
      approved:'Одобрено',
      paid:    'Оплачено',
    };
    const histEntry = { date: new Date().toISOString(), actor: actorName,
      action: actionLabels[next] || `Переведено в "${STATUSES[next]?.label}"`, comment };
    return { ...req, status: next, treasuryComment: comment || req.treasuryComment,
      history: [...req.history, histEntry] };
  };

  const rejectReq = (req, actorName, comment='') => {
    const histEntry = { date: new Date().toISOString(), actor: actorName, action: 'Отклонено', comment };
    return { ...req, status: 'rejected', history: [...req.history, histEntry] };
  };

  const handleApprove = (req, actorName, comment) => {
    onUpdate(advanceStatus(req, actorName, comment));
  };

  const handleReject = (req, actorName, comment) => {
    onUpdate(rejectReq(req, actorName, comment));
  };

  const handleBlock = (req, action, actorName) => {
    if (action === 'block') {
      const histEntry = { date: new Date().toISOString(), actor: actorName, action: '🔒 Счёт заблокирован', comment: '' };
      onUpdate({ ...req, status: 'blocked', blockedBy: actorName, blockedPrevStatus: req.status, history: [...req.history, histEntry] });
    } else {
      const histEntry = { date: new Date().toISOString(), actor: actorName, action: '🔓 Блокировка снята', comment: '' };
      onUpdate({ ...req, status: req.blockedPrevStatus || 'new', blockedBy: null, blockedPrevStatus: null, history: [...req.history, histEntry] });
    }
  };

  const handleQuickApprove = (req) => {
    if (!canActOn(user.role, req.status, req)) return;
    onUpdate(advanceStatus(req, user.name));
  };

  const handleQuickReject = (req) => {
    if (!canActOn(user.role, req.status, req)) return;
    const reason = window.prompt('Причина отклонения:');
    if (reason === null) return;
    onUpdate(rejectReq(req, user.name, reason));
  };

  const handleBulkApprove = () => {
    const toUpdate = requests.filter(r => selectedIds.includes(r.id) && canActOn(user.role, r.status, r));
    toUpdate.forEach(r => onUpdate(advanceStatus(r, user.name)));
    setSelectedIds([]);
  };

  const handleBulkReject = () => {
    const reason = window.prompt('Причина отклонения (для всех выбранных):');
    if (reason === null) return;
    const toUpdate = requests.filter(r => selectedIds.includes(r.id) && canActOn(user.role, r.status, r));
    toUpdate.forEach(r => onUpdate(rejectReq(r, user.name, reason)));
    setSelectedIds([]);
  };

  const handleUpdateComment = (id, comment) => {
    const req = requests.find(r=>r.id===id);
    if (req) onUpdate({ ...req, treasuryComment: comment });
  };

  const exportCSV = () => {
    const rows = [
      ['ID','Инициатор','Должность','Филиал','Тип','Категория','Сумма','Срок','Статус','Назначение'].join(','),
      ...filtered.map(r=>[
        r.id, r.initiatorName, r.initiatorPosition, r.branch,
        r.type==='invoice'?'Оплата счёта':'Выдача подотчёт',
        getCategoryLabel(r.category), r.amount, r.dueDate, STATUSES[r.status]?.label||r.status,
        `"${r.purpose.replace(/"/g,'""')}"`
      ].join(','))
    ].join('\n');
    const blob = new Blob(['﻿'+rows], {type:'text/csv;charset=utf-8'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href=url; a.download='imbir_pay_export.csv'; a.click();
    URL.revokeObjectURL(url);
  };

  const toggleSelect = id => setSelectedIds(prev => prev.includes(id) ? prev.filter(x=>x!==id) : [...prev,id]);
  const toggleAll = checked => setSelectedIds(checked ? filtered.map(r=>r.id) : []);

  return (
    <div className="max-w-screen-xl mx-auto px-6 py-6">
      <div className="flex items-center justify-between mb-6">
        <div>
          <h2 className="text-xl font-bold text-gray-900">Казначейская панель</h2>
          <p className="text-sm text-gray-500 mt-0.5">Управление заявками на оплату · Imbir Group</p>
        </div>
        <div className="text-right">
          <div className="text-xs text-gray-400">Всего в обработке</div>
          <div className="text-xl font-bold text-gray-900">{fmt(sumOf(requests.filter(r=>!['paid','rejected'].includes(r.status))))}</div>
        </div>
      </div>

      <KPICards requests={requests} filter={filter} setFilter={setFilter} />
      <PipelineBar requests={requests} />
      <FilterBar filter={filter} setFilter={setFilter} search={search} setSearch={setSearch}
                 onExportCSV={exportCSV} selectedIds={selectedIds} requests={filtered}
                 onBulkApprove={handleBulkApprove} onBulkReject={handleBulkReject} user={user} />
      <RequestsTable requests={filtered} onSelectRow={setDrawerReq} selectedIds={selectedIds}
                     onToggleSelect={toggleSelect} onToggleAll={toggleAll}
                     onQuickApprove={handleQuickApprove} onQuickReject={handleQuickReject} user={user} />

      {drawerReq && (
        <Drawer req={drawerReq} user={user}
                onClose={()=>setDrawerReq(null)}
                onApprove={(req,actor,comment)=>handleApprove(req,actor,comment)}
                onReject={(req,actor,comment)=>handleReject(req,actor,comment)}
                onBlock={(req,action,actor)=>handleBlock(req,action,actor)}
                onDelete={onDelete} onEdit={onEdit}
                onUpdateComment={handleUpdateComment} />
      )}
    </div>
  );
}

function StepIndicator({ step }) {
  const steps = [
    { n:1, label:'Инициатор' },
    { n:2, label:'Данные заявки' },
    { n:3, label:'Маршрут' },
    { n:4, label:'Подтверждение' },
  ];
  return (
    <div className="flex items-center justify-between mb-8">
      {steps.map((s, i) => {
        const done = step > s.n;
        const active = step === s.n;
        return (
          <React.Fragment key={s.n}>
            <div className="flex flex-col items-center gap-1.5">
              <div className="step-dot text-sm" style={{
                background: done ? '#1B9963' : active ? BRAND : '#e5e7eb',
                color: (done||active) ? '#fff' : '#9ca3af'
              }}>
                {done ? '✓' : s.n}
              </div>
              <span className={`text-xs font-medium whitespace-nowrap ${active?'text-purple-700':done?'text-green-600':'text-gray-400'}`}>
                {s.label}
              </span>
            </div>
            {i < steps.length-1 && (
              <div className="flex-1 h-0.5 mx-2" style={{background: step > s.n ? '#1B9963' : '#e5e7eb'}} />
            )}
          </React.Fragment>
        );
      })}
    </div>
  );
}

const EMPTY_FORM = {
  branch:'', initiatorName:'', initiatorPosition:'',
  type:'', category:'',
  // Invoice
  file:null, fileName:'', fileData:null, amount:'', dueDate:'', priority:'standard', purpose:'',
  // Advance
  requestName:'', recipient:'', paymentForm:'Наличные', periodFrom:'', periodTo:'',
  // Confirm
  agreed:false,
};

function NewRequestForm({ user, requests, onSubmit, settings, editingReq, onSaveEdit }) {
  const cfg = settings || DEFAULT_SETTINGS;
  const isEditing = !!editingReq;
  const [step, setStep] = useState(1);
  const [form, setForm] = useState(() => {
    if (editingReq) return { ...editingReq };
    return { ...EMPTY_FORM, initiatorName: user.name, initiatorPosition: user.position };
  });
  const [errors, setErrors] = useState({});
  const [dupWarning, setDupWarning] = useState('');

  const set = (k, v) => setForm(f=>({...f, [k]:v}));

  const checkDup = (field, val) => {
    if (!val) { setDupWarning(''); return false; }
    if (field==='fileName') {
      const exists = requests.some(r=>r.fileName === val);
      setDupWarning(exists ? `⚠️ Файл "${val}" уже зарегистрирован — возможный дубликат` : '');
      return exists;
    }
    if (field==='requestName') {
      const exists = requests.some(r=>r.requestName === val);
      setDupWarning(exists ? `⚠️ Заявка "${val}" уже существует — возможный дубликат` : '');
      return exists;
    }
    return false;
  };

  const validateStep1 = () => {
    const e={};
    if (!form.branch) e.branch='Выберите филиал';
    if (!form.initiatorName) e.initiatorName='Выберите инициатора';
    return e;
  };

  const validateStep2 = () => {
    const e={};
    if (!form.type) e.type='Выберите тип заявки';
    if (!form.category) e.category='Выберите категорию';
    if (!form.amount || Number(form.amount)<=0) e.amount='Введите корректную сумму';
    if (!form.dueDate) e.dueDate='Укажите желаемую дату';
    if (!form.purpose.trim()) e.purpose='Заполните назначение';
    if (form.type==='invoice' && !form.fileName) e.fileName='Прикрепите скан счёта';
    if (form.type==='advance') {
      if (!form.requestName.trim()) e.requestName='Укажите название заявки';
      if (!form.recipient.trim()) e.recipient='Укажите получателя';
      if (!form.periodFrom) e.periodFrom='Укажите начало периода';
      if (!form.periodTo) e.periodTo='Укажите конец периода';
    }
    return e;
  };

  const next = () => {
    let e = {};
    if (step===1) e = validateStep1();
    if (step===2) e = validateStep2();
    if (Object.keys(e).length) { setErrors(e); return; }
    setErrors({});
    setStep(s=>s+1);
  };

  const handleFileChange = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    if (file.size > 10*1024*1024) { setErrors(er=>({...er, fileName:'Файл слишком большой (макс. 10 МБ)'})); return; }
    set('file', file);
    set('fileName', file.name);
    set('fileData', null);
    checkDup('fileName', file.name);
    // Сохраняем base64 для предпросмотра (файлы до 3 МБ)
    if (file.size <= 3*1024*1024) {
      const reader = new FileReader();
      reader.onload = ev => set('fileData', ev.target.result);
      reader.readAsDataURL(file);
    }
  };

  const handleSubmit = () => {
    if (!form.agreed) { setErrors({agreed:'Необходимо подтвердить данные'}); return; }

    if (isEditing) {
      const updated = {
        ...editingReq,
        type: form.type,
        category: form.category,
        amount: Number(form.amount),
        dueDate: form.dueDate,
        priority: form.priority,
        purpose: form.purpose,
        ...(form.type==='invoice' ? { fileName: form.fileName, fileData: form.fileData || editingReq.fileData || null } : {
          requestName: form.requestName,
          recipient: form.recipient,
          paymentForm: form.paymentForm,
          periodFrom: form.periodFrom,
          periodTo: form.periodTo,
        }),
        history: [
          ...(editingReq.history || []),
          { date: new Date().toISOString(), actor: form.initiatorName, action: 'Заявка скорректирована инициатором', comment: '' },
        ],
      };
      onSaveEdit(updated);
      return;
    }

    const isDup = form.type==='invoice'
      ? requests.some(r=>r.fileName===form.fileName)
      : requests.some(r=>r.requestName===form.requestName);

    const newReq = {
      id: genId(),
      type: form.type,
      category: form.category,
      initiatorName: form.initiatorName,
      initiatorPosition: form.initiatorPosition,
      branch: form.branch,
      amount: Number(form.amount),
      dueDate: form.dueDate,
      priority: form.priority,
      purpose: form.purpose,
      status: 'manager',
      createdAt: new Date().toISOString(),
      isDup,
      treasuryComment: '',
      history: [
        { date: new Date().toISOString(), actor: form.initiatorName, action: 'Заявка создана', comment: '' },
      ],
      ...(form.type==='invoice' ? { fileName: form.fileName, fileData: form.fileData || null } : {
        requestName: form.requestName,
        recipient: form.recipient,
        paymentForm: form.paymentForm,
        periodFrom: form.periodFrom,
        periodTo: form.periodTo,
      }),
    };

    onSubmit(newReq, isDup);
  };

  const priorityIdx = PRIORITY_STEPS.indexOf(form.priority);

  const userByName = name => USERS.find(u=>u.name===name);

  return (
    <div className="max-w-2xl mx-auto px-6 py-8">
      <div className="mb-6">
        <h2 className="text-xl font-bold text-gray-900">{isEditing ? `✏️ Корректировка заявки ${editingReq.id}` : 'Новая заявка'}</h2>
        <p className="text-sm text-gray-500 mt-0.5">Заполните форму для отправки на согласование</p>
      </div>

      <div className="card p-8">
        <StepIndicator step={step} />

        
        {step===1 && (
          <div className="space-y-5 anim-fade">
            <h3 className="font-semibold text-gray-800 text-lg">Шаг 01 — Инициатор</h3>

            {/* Branch first */}
            <div>
              <label className="block text-sm font-medium text-gray-700 mb-1.5">Филиал *</label>
              <select value={form.branch}
                      onChange={e=>{
                        set('branch', e.target.value);
                        set('initiatorName', '');
                        set('initiatorPosition', '');
                        setErrors(er=>({...er, branch:'', initiatorName:''}));
                      }}
                      className="input-field">
                <option value="">— Выберите филиал —</option>
                {(cfg.branches.filter(b=>b!=='Головной офис')).map(b=><option key={b} value={b}>{b}</option>)}
              </select>
              {errors.branch && <p className="text-xs text-red-500 mt-1">{errors.branch}</p>}
            </div>

            {/* Initiator filtered by branch */}
            {form.branch && (
              <div className="anim-fade">
                <label className="block text-sm font-medium text-gray-700 mb-1.5">Инициатор *</label>
                <select value={form.initiatorName}
                        onChange={e=>{
                          const u = userByName(e.target.value);
                          set('initiatorName', e.target.value);
                          set('initiatorPosition', u?.position||'');
                          setErrors(er=>({...er, initiatorName:''}));
                        }}
                        className="input-field">
                  <option value="">— Выберите ФИО —</option>
                  {getBranchUsers(form.branch, cfg).map(u=>(
                    <option key={u.name} value={u.name}>{u.name} — {u.position}</option>
                  ))}
                </select>
                {errors.initiatorName && <p className="text-xs text-red-500 mt-1">{errors.initiatorName}</p>}
              </div>
            )}

            {form.initiatorName && (
              <div className="rounded-xl p-4 anim-fade" style={{background:"#f5f0f8", border:"1px solid #c4a8d8"}}>
                <div className="text-sm font-medium text-gray-800">{form.initiatorName}</div>
                <div className="text-xs text-gray-500 mt-0.5">{form.initiatorPosition} · {form.branch}</div>
              </div>
            )}
          </div>
        )}

        
        {step===2 && (
          <div className="space-y-6 anim-fade">
            <h3 className="font-semibold text-gray-800 text-lg">Шаг 02 — Данные заявки</h3>

            {/* 02·A Type */}
            <div>
              <label className="block text-sm font-medium text-gray-700 mb-2">Тип заявки *</label>
              <div className="grid grid-cols-2 gap-3">
                {[
                  { value:'invoice', icon:'🧾', title:'Оплата счёта', desc:'Безналичный платёж поставщику' },
                  { value:'advance', icon:'💵', title:'Выдача подотчёт', desc:'Наличные или аванс сотруднику' },
                ].map(t=>(
                  <button key={t.value} type="button"
                          onClick={()=>{ set('type',t.value); setErrors(er=>({...er,type:''})); }}
                          className={`p-4 rounded-xl border-2 text-left transition-all ${
                            form.type===t.value ? 'border-yellow-500 bg-yellow-50' : 'border-gray-200 hover:border-gray-300 bg-white'}`}>
                    <div className="text-2xl mb-1">{t.icon}</div>
                    <div className="text-sm font-semibold text-gray-800">{t.title}</div>
                    <div className="text-xs text-gray-500 mt-0.5">{t.desc}</div>
                  </button>
                ))}
              </div>
              {errors.type && <p className="text-xs text-red-500 mt-1">{errors.type}</p>}
            </div>

            {/* 02·B Category */}
            <div>
              <label className="block text-sm font-medium text-gray-700 mb-2">Категория расходов *</label>
              <div className="grid grid-cols-3 gap-2">
                {CATEGORIES.map(c=>(
                  <button key={c.id} type="button"

                          className={`p-3 rounded-xl border-2 text-center transition-all ${

                    <div className="text-xs font-medium text-gray-700 mt-1 leading-tight">{c.label}</div>

              </div>
              {errors.category && <p className="text-xs text-red-500 mt-1">{errors.category}</p>}
            </div>

            {/* 02·C Type-specific */}
            {form.type==='invoice' && (
              <div className="space-y-4">
                <div>
                  <label className="block text-sm font-medium text-gray-700 mb-1.5">Скан счёта * (PDF, JPG, PNG — до 10 МБ)</label>
                  <div className={`border-2 border-dashed rounded-xl p-6 text-center cursor-pointer hover:bg-gray-50 transition-colors ${errors.fileName?'border-red-300':'border-gray-300'}`}

                      </div>
                    ) : (

                        <div className="text-3xl mb-2">📄</div>
                        <div>Нажмите или перетащите файл</div>
                      </div>

                  </div>
                  <input id="fileInput" type="file" accept=".pdf,.jpg,.jpeg,.png" className="hidden" onChange={handleFileChange} />
                  {errors.fileName && <p className="text-xs text-red-500 mt-1">{errors.fileName}</p>}
                  {dupWarning && <p className="text-xs text-amber-600 mt-1 bg-amber-50 p-2 rounded-lg">{dupWarning}</p>}

            {form.type==='advance' && (

                    {errors.recipient && <p className="text-xs text-red-500 mt-1">{errors.recipient}</p>}

                  <div>
                    <label className="block text-sm font-medium text-gray-700 mb-1.5">Форма выдачи</label>
                    <select className="input-field" value={form.paymentForm} onChange={e=>set('paymentForm',e.target.value)}>

                <div className="grid grid-cols-2 gap-4">

                    <label className="block text-sm font-medium text-gray-700 mb-1.5">Период: с *</label>
                    <input type="date" className="input-field" value={form.periodFrom}

                      <div className="text-xs text-gray-500">{c.title} · {c.step}</div>
                    </div>
                  </div>
                ))}
                <div className="flex items-center gap-4">
                  <div className="w-8 h-8 rounded-full bg-blue-600 flex items-center justify-center text-white text-sm font-bold flex-shrink-0">💳</div>
                  <div className="flex-1 bg-blue-50 rounded-xl p-3 border border-blue-100">
                    <div className="text-sm font-semibold text-blue-800">Статус: Оплачено</div>
                    <div className="text-xs text-blue-500">После исполнения казначеем</div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        )}

        
        {step===4 && (
          <div className="space-y-6 anim-fade">
            <h3 className="font-semibold text-gray-800 text-lg">Шаг 04 — Подтверждение</h3>

            <div className="overflow-hidden rounded-xl border border-gray-200">
              <table className="w-full text-sm">
                <tbody>
                  {[
                    ['Инициатор', form.initiatorName],
                    ['Должность', form.initiatorPosition],
                    ['Филиал', form.branch],
                    ['Тип заявки', form.type==='invoice'?'🧾 Оплата счёта':'💵 Выдача подотчёт'],
                    ['Категория', `${getCategoryIcon(form.category)} ${getCategoryLabel(form.category)}`],
                    ['Сумма', fmt(form.amount)],
                    ['Срок оплаты', fmtD(form.dueDate)],
                    ['Приоритет', PRIORITY_LABELS[form.priority]],
                    ...(form.type==='invoice'
                      ? [['Файл счёта', form.fileName]]
                      : [['Название', form.requestName],['Получатель', form.recipient],['Форма выдачи', form.paymentForm],['Период', `${fmtD(form.periodFrom)} — ${fmtD(form.periodTo)}`]]
                    ),
                    ['Назначение', form.purpose],
                  ].map(([k,v],i)=>(
                    <tr key={i} className={i%2===0?'bg-gray-50':''}>
                      <td className="px-4 py-2.5 text-gray-500 font-medium w-40">{k}</td>
                      <td className="px-4 py-2.5 text-gray-800">{v}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>

            {dupWarning && (
              <div className="bg-amber-50 border border-amber-200 rounded-xl p-4 text-sm text-amber-700">
                {dupWarning}<br/>
                <span className="text-xs mt-1 block">Заявка будет помечена меткой DUP, но всё равно может быть отправлена.</span>
              </div>
            )}

            <label className="flex items-start gap-3 cursor-pointer group">
              <input type="checkbox" className="checkbox-orange mt-0.5"
                     checked={form.agreed} onChange={e=>{ set('agreed',e.target.checked); setErrors(er=>({...er,agreed:''})); }} />
              <span className="text-sm text-gray-700 leading-relaxed">
                Я подтверждаю, что все указанные данные верны и даю согласие на обработку заявки.
                Заявка будет направлена руководителю на 1-е согласование.
              </span>
            </label>
            {errors.agreed && <p className="text-xs text-red-500">{errors.agreed}</p>}
          </div>
        )}

        {/* Navigation */}
        <div className="flex justify-between mt-8 pt-6 border-t border-gray-100">
          <button onClick={()=>setStep(s=>s-1)} disabled={step===1} className="btn-ghost">
            ← Назад
          </button>
          {step < 4 ? (
            <button onClick={next} className="btn-primary">
              Далее →
            </button>
          ) : (
            <button onClick={handleSubmit} className="btn-primary">
              {isEditing ? '💾 Сохранить изменения' : '📤 Отправить заявку'}
            </button>
          )}
        </div>
      </div>
    </div>
  );
}

function App() {
  const [user, setUser] = useState(() => {
    try { const s = localStorage.getItem('imbir_session'); if (!s) return null; const saved = JSON.parse(s); const fresh = USERS.find(u=>u.name===saved.name); return fresh ? {...saved, role: fresh.role, position: fresh.position} : saved; } catch(e) { return null; }
  });
  const [activeTab, setActiveTab] = useState('dashboard');
  const [requests, setRequests] = useState(() => lsLoad() || []);
  const [settings,  setSettings]  = useState(() => loadSettings()  || DEFAULT_SETTINGS);
  const [passwords,  setPasswords]  = useState(() => loadPasswords() || DEFAULT_PASSWORDS);
  const [waContacts, setWAContacts] = useState(() => loadWA() || {});
  const [showChangePw, setShowChangePw] = useState(false);
  const [toast, setToast] = useState(null);
  const [syncStatus, setSyncStatus] = useState('checking');
  const [editingReq, setEditingReq] = useState(null);

  const showToast = (message, type='success') => setToast({ message, type });

  // Загрузка из Supabase при старте + realtime подписка
  useEffect(() => {
    (async () => {
      const data = await sbLoad();
      if (data && data.length > 0) {
        setRequests(data);
        lsSave(data);
        setSyncStatus('ok');
      } else if (data && data.length === 0) {
        setSyncStatus('ok');
      } else {
        setSyncStatus('offline');
      }
    })();
    const unsub = sbSubscribe(newData => {
      setRequests(newData);
      lsSave(newData);
      setSyncStatus('ok');
    });
    return unsub;
  }, []);

  const handleUpdatePassword = (name, newPw) => {
    const updated = { ...passwords, [name]: newPw };
    setPasswords(updated);
    savePasswords(updated);
  };

  const handleUpdateWA = (contacts) => {
    setWAContacts(contacts);
    saveWA(contacts);
  };

  useEffect(() => { lsSave(requests); }, [requests]);

  const handleLogin = (u) => {
    setUser(u);
    try { localStorage.setItem('imbir_session', JSON.stringify(u)); } catch(e) {}
    setActiveTab(['manager','admin','treasurer'].includes(u.role) ? 'dashboard' : 'form');
  };

  const handleLogout = () => {
    setUser(null);
    try { localStorage.removeItem('imbir_session'); } catch(e) {}
  };

  const updateRequest = (updated) => {
    const previous = requests.find(r => r.id === updated.id);
    if (previous && previous.status !== updated.status) {
      dispatchWANotifications(updated, previous.status, waContacts);
    }
    const newList = requests.map(r => r.id===updated.id ? updated : r);
    setRequests(newList);
    lsSave(newList);
    sbSave(newList);
  };

  const deleteRequest = (id) => {
    const newList = requests.filter(r => r.id !== id);
    setRequests(newList);
    lsSave(newList);
    sbDelete(id);
    showToast('Заявка удалена', 'success');
  };

  const addRequest = (req, isDup) => {
    const newList = [...requests, req];
    setRequests(newList);
    lsSave(newList);
    sbSave(newList);
    dispatchWANotifications(req, null, waContacts);
    showToast(isDup
      ? `Заявка ${req.id} отправлена (обнаружен возможный дубликат — DUP)`
      : `Заявка ${req.id} успешно отправлена на согласование`, isDup?'info':'success');
    setActiveTab(['manager','admin','treasurer'].includes(user.role) ? 'dashboard' : 'my');
  };

  if (!user) return (
    <>
      <LoginPage onLogin={handleLogin} settings={settings} passwords={passwords} />
      {toast && <Toast {...toast} onClose={()=>setToast(null)} />}
    </>
  );

  return (
    <div className="min-h-screen bg-gray-50">
      <TopBar user={user} activeTab={activeTab} setActiveTab={setActiveTab} onLogout={handleLogout}
              onChangePassword={() => setShowChangePw(true)} />
      {showChangePw && (
        <ProfileModal user={user} passwords={passwords} waContacts={waContacts}
                      onSavePassword={handleUpdatePassword}
                      onSaveWA={(name, contact) => handleUpdateWA({ ...waContacts, [name]: contact })}
                      onClose={() => setShowChangePw(false)} />
      )}

      {activeTab==='dashboard' && ['manager','admin','treasurer'].includes(user.role) && (
        <DashboardView requests={requests} user={user} onUpdate={updateRequest} onDelete={deleteRequest}
          onEdit={(req) => { setEditingReq(req); setActiveTab('form'); }} />
      )}
      {activeTab==='form' && (
        <NewRequestForm user={user} requests={requests} onSubmit={addRequest} settings={settings}
          editingReq={editingReq}
          onSaveEdit={(updated) => { updateRequest(updated); setEditingReq(null); showToast('Заявка обновлена'); }}
          key={editingReq ? editingReq.id + '_edit' : requests.length} />
      )}
      {activeTab==='my' && (
        <MyRequestsView requests={requests} user={user}
          onDelete={deleteRequest}
          onEdit={(req) => { setEditingReq(req); setActiveTab('form'); }} />
      )}
      {activeTab==='settings' && ['manager','admin','treasurer'].includes(user.role) && (
        <SettingsView settings={settings} setSettings={s=>{ setSettings(s); saveSettings(s); }}
                      passwords={passwords} onUpdatePassword={handleUpdatePassword}
                      waContacts={waContacts} onUpdateWA={handleUpdateWA}
                      fbConfig={null} onSaveFB={()=>{}} fbConnected={true} />
      )}

      {toast && <Toast {...toast} onClose={()=>setToast(null)} />}
    </div>
  );
}

//

class ErrorBoundary extends React.Component {
  constructor(p) { super(p); this.state = { err: null }; }
  static getDerivedStateFromError(e) { return { err: e }; }
  render() {
    if (this.state.err) return (
      <div style={{padding:32,fontFamily:'monospace',color:'#dc2626'}}>
        <h2>⚠️ Ошибка приложения</h2>
        <pre style={{whiteSpace:'pre-wrap',fontSize:12}}>{String(this.state.err)}</pre>
        <button onClick={()=>window.location.reload()} style={{marginTop:16,padding:'8px 16px',background:'#dc2626',color:'#fff',border:'none',borderRadius:8,cursor:'pointer'}}>
          Перезагрузить
        </button>
      </div>
    );
    return this.props.children;
  }
}

ReactDOM.createRoot(document.getElementById('root')).render(
  <ErrorBoundary><App /></ErrorBoundary>
);
</script>
</body>
</html>
